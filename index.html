<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>塔罗秘境</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#09070d;--gold:#d4af37;--light-gold:#f1ddb0;--text:#f7f2e8;--purple:#7f67b5;--crimson:#6a2d2d;--panel:rgba(9,7,13,0.85);--card-shadow:0 4px 30px rgba(212,175,55,0.15)}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Times New Roman','Songti SC','Noto Serif SC',serif;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
body{position:relative}
#bgCanvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
.screen{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:1;transition:opacity 0.8s ease,transform 0.8s ease;padding:20px}
.screen.hidden{opacity:0;pointer-events:none;transform:scale(0.95)}
#homeScreen{text-align:center}
#homeScreen .title{font-size:clamp(2.4rem,8vw,4.5rem);color:var(--gold);letter-spacing:0.3em;text-shadow:0 0 40px rgba(212,175,55,0.3),0 0 80px rgba(212,175,55,0.1);margin-bottom:0.5em;font-weight:400}
#homeScreen .subtitle{font-size:clamp(0.9rem,3.5vw,1.3rem);color:var(--light-gold);letter-spacing:0.15em;line-height:2;opacity:0.7;margin-bottom:2.5em;max-width:320px}
#homeScreen .subtitle span{display:block}
#homeScreen .subtitle .divider{width:60px;height:1px;background:var(--gold);margin:1.2em auto;opacity:0.4}
#startBtn{background:transparent;border:1px solid var(--gold);color:var(--gold);padding:16px 48px;font-size:clamp(1rem,4vw,1.2rem);letter-spacing:0.25em;cursor:pointer;font-family:inherit;position:relative;transition:all 0.5s ease;outline:none;border-radius:2px;animation:breathe 3s ease-in-out infinite}
@keyframes breathe{0%,100%{box-shadow:0 0 10px rgba(212,175,55,0.1),0 0 20px rgba(212,175,55,0.05)}50%{box-shadow:0 0 25px rgba(212,175,55,0.25),0 0 50px rgba(212,175,55,0.1)}}
#startBtn::before{content:'';position:absolute;top:-2px;left:-2px;right:-2px;bottom:-2px;border:1px solid transparent;transition:all 0.5s ease;border-radius:4px}
#startBtn:hover::before,#startBtn:focus-visible::before{border-color:var(--gold);box-shadow:0 0 20px rgba(212,175,55,0.2),inset 0 0 20px rgba(212,175,55,0.05)}
#startBtn .glow{position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(212,175,55,0.15),transparent);transition:left 0.6s ease}
#startBtn:hover .glow{left:100%}
#drawScreen{justify-content:flex-start;padding-top:clamp(16px,5vh,40px)}
#drawScreen .top-bar{width:100%;max-width:420px;display:flex;justify-content:space-between;align-items:center;padding:0 8px 12px;border-bottom:1px solid rgba(212,175,55,0.2);margin-bottom:clamp(8px,2vh,16px)}
#drawScreen .top-bar h2{font-size:clamp(0.85rem,3.5vw,1rem);color:var(--gold);letter-spacing:0.15em;font-weight:400}
#drawScreen .top-bar .controls{display:flex;gap:8px;align-items:center}
#drawScreen .top-bar .controls button{background:transparent;border:1px solid rgba(212,175,55,0.3);color:var(--light-gold);padding:6px 14px;font-size:clamp(0.65rem,2.8vw,0.8rem);cursor:pointer;font-family:inherit;border-radius:2px;transition:all 0.3s;letter-spacing:0.1em;white-space:nowrap}
#drawScreen .top-bar .controls button.active{border-color:var(--gold);background:rgba(212,175,55,0.1)}
#drawScreen .top-bar .controls button:hover{border-color:var(--gold)}
#drawScreen .top-bar .sound-btn{background:transparent;border:1px solid rgba(212,175,55,0.3);color:var(--light-gold);width:34px;height:34px;font-size:16px;cursor:pointer;border-radius:50%;transition:all 0.3s;display:flex;align-items:center;justify-content:center;line-height:1}
#drawScreen .top-bar .sound-btn:hover{border-color:var(--gold)}
#deckArea{width:100%;max-width:400px;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;min-height:0}
#deckContainer{position:relative;width:clamp(120px,35vw,180px);height:clamp(180px,50vw,260px);margin-bottom:clamp(8px,2vh,12px);cursor:pointer;perspective:1200px}
@keyframes deckFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
#deckContainer.floating{animation:deckFloat 4s ease-in-out infinite}
.card-back{position:absolute;width:100%;height:100%;border-radius:6px;background:linear-gradient(145deg,#1a1528,#0d0a18);border:2px solid var(--gold);overflow:hidden;box-shadow:var(--card-shadow),0 8px 32px rgba(0,0,0,0.5)}
.card-back::before{content:'';position:absolute;inset:6px;border:1px solid rgba(212,175,55,0.25);border-radius:4px;z-index:0}
.card-back .inner{position:absolute;inset:10px;border:1px solid rgba(212,175,55,0.12);border-radius:3px;display:flex;align-items:center;justify-content:center;z-index:1}
.card-back .inner .symbol{font-size:clamp(1.2rem,5vw,2rem);color:var(--gold);opacity:0.25;letter-spacing:0.3em}
.card-back .ornament{position:absolute;width:60%;height:60%;top:20%;left:20%;border:1px solid rgba(212,175,55,0.08);border-radius:50%;z-index:0}
.card-back .ornament2{position:absolute;width:40%;height:40%;top:30%;left:30%;border:1px solid rgba(212,175,55,0.06);border-radius:50%;z-index:0}
.card-back .star{position:absolute;width:3px;height:3px;background:var(--gold);border-radius:50%;opacity:0.3}
#deckContainer .card-back.layer-1{transform:rotate(-3deg) translateX(-4px) translateY(3px);z-index:0}
#deckContainer .card-back.layer-2{transform:rotate(1deg) translateX(3px) translateY(-2px);z-index:1}
#deckContainer .card-back.layer-3{transform:rotate(-1deg) translateX(-1px) translateY(1px);z-index:2}
#deckContainer .card-back.layer-4{transform:rotate(2deg) translateX(-2px) translateY(-1px);z-index:3}
#deckContainer .card-back.layer-5{transform:rotate(0deg) translateX(0) translateY(0);z-index:4}
@keyframes shuffleSlide{0%,100%{transform:translateX(0)}25%{transform:translateX(-20px) rotate(-2deg)}50%{transform:translateX(0)}75%{transform:translateX(20px) rotate(2deg)}}
.shuffling #deckContainer .card-back{animation:shuffleSlide 0.15s ease-in-out infinite}
.card-front-face{width:100%;height:100%;border-radius:4px;position:relative;overflow:hidden}
.card-front-face canvas{width:100%;height:100%;display:block;border-radius:4px}
#cardsDisplay{width:100%;max-width:420px;display:flex;justify-content:center;gap:clamp(8px,2vw,16px);padding:8px 0;flex-wrap:wrap;min-height:clamp(140px,40vw,220px)}
#cardsDisplay .result-card{width:clamp(80px,26vw,120px);height:clamp(120px,38vw,175px);cursor:pointer;transition:transform 0.3s,box-shadow 0.3s;position:relative;border-radius:4px;flex-shrink:0}
#cardsDisplay .result-card:hover{transform:translateY(-4px);box-shadow:0 8px 30px rgba(212,175,55,0.2)}
#cardsDisplay .result-card .card-inner{width:100%;height:100%;background:linear-gradient(145deg,#1a1528,#0d0a18);border:2px solid var(--gold);border-radius:4px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4px;position:relative;overflow:hidden}
#cardsDisplay .result-card .card-inner img.card-img{width:100%;height:100%;object-fit:cover;border-radius:2px;position:absolute;top:0;left:0}
#cardsDisplay .result-card .card-overlay{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(9,7,13,0.85));padding:4px 6px 6px;z-index:1}
#cardsDisplay .result-card .label{font-size:clamp(0.4rem,1.8vw,0.55rem);color:var(--light-gold);opacity:0.7}
#cardsDisplay .result-card .name{font-size:clamp(0.5rem,2.2vw,0.65rem);color:var(--gold);text-align:center;line-height:1.1}
#cardsDisplay .result-card .reversed-indicator{font-size:clamp(0.35rem,1.5vw,0.45rem);color:var(--crimson)}
#cardsDisplay .result-card .suit-icon{font-size:clamp(0.6rem,2.5vw,0.8rem);opacity:0.3;margin-top:1px}
#cardsDisplay .result-card .position-tag{position:absolute;top:-10px;left:50%;transform:translateX(-50%);font-size:clamp(0.4rem,1.8vw,0.55rem);color:var(--light-gold);background:var(--bg);padding:0 6px;white-space:nowrap;letter-spacing:0.1em;opacity:0.6;z-index:2}
#readingPanel{position:fixed;top:0;left:0;width:100%;height:100%;z-index:200;display:flex;flex-direction:column;background:var(--panel);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);transform:translateY(100%);transition:transform 0.6s cubic-bezier(0.4,0,0.2,1);overflow:hidden}
#readingPanel.open{transform:translateY(0)}
#readingPanel .panel-header{width:100%;padding:clamp(12px,4vh,24px) 20px 12px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(212,175,55,0.15);flex-shrink:0}
#readingPanel .panel-header h2{font-size:clamp(1rem,4vw,1.3rem);color:var(--gold);letter-spacing:0.2em;font-weight:400}
#readingPanel .panel-header .panel-actions{display:flex;gap:8px;align-items:center}
#readingPanel .panel-header .panel-actions button{background:transparent;border:1px solid rgba(212,175,55,0.3);color:var(--light-gold);padding:6px 12px;font-size:clamp(0.55rem,2.5vw,0.7rem);cursor:pointer;font-family:inherit;border-radius:2px;transition:all 0.3s;letter-spacing:0.05em;white-space:nowrap}
#readingPanel .panel-header .panel-actions button:hover{border-color:var(--gold);background:rgba(212,175,55,0.06)}
#readingPanel .panel-body{flex:1;overflow-y:auto;padding:16px 20px 30px;-webkit-overflow-scrolling:touch}
#readingPanel .panel-body::-webkit-scrollbar{width:3px}
#readingPanel .panel-body::-webkit-scrollbar-track{background:transparent}
#readingPanel .panel-body::-webkit-scrollbar-thumb{background:rgba(212,175,55,0.3);border-radius:2px}
.reading-content{animation:inkReveal 0.8s ease}
@keyframes inkReveal{0%{opacity:0;clip-path:inset(0 100% 0 0)}100%{opacity:1;clip-path:inset(0 0 0 0)}}
.reading-content .card-list{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.reading-content .card-list .mini-card{width:clamp(50px,15vw,72px);height:clamp(72px,22vw,105px);background:linear-gradient(145deg,#1a1528,#0d0a18);border:1px solid var(--gold);border-radius:3px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all 0.3s;flex-shrink:0;padding:3px}
.reading-content .card-list .mini-card:hover{border-color:var(--light-gold);transform:translateY(-2px)}
.reading-content .card-list .mini-card .mc-label{font-size:clamp(0.35rem,1.6vw,0.5rem);color:var(--light-gold);opacity:0.5}
.reading-content .card-list .mini-card .mc-name{font-size:clamp(0.45rem,2vw,0.65rem);color:var(--gold);text-align:center;line-height:1.2}
.reading-content .card-list .mini-card .mc-rev{font-size:clamp(0.35rem,1.5vw,0.45rem);color:var(--crimson)}
.reading-content .card-list .mini-card .mc-suit{font-size:clamp(0.5rem,2.2vw,0.7rem);opacity:0.3;margin-top:1px}
.reading-content .section{margin-bottom:18px;padding:14px;background:rgba(9,7,13,0.4);border-left:2px solid rgba(212,175,55,0.2);border-radius:0 4px 4px 0;position:relative}
.reading-content .section .sec-title{font-size:clamp(0.75rem,3vw,0.9rem);color:var(--gold);letter-spacing:0.15em;margin-bottom:8px;font-weight:400}
.reading-content .section .sec-divider{width:40px;height:1px;background:var(--gold);opacity:0.2;margin-bottom:8px}
.reading-content .section p{font-size:clamp(0.75rem,3vw,0.9rem);line-height:1.8;color:var(--text);opacity:0.85}
.reading-content .section .reveal-btn{background:transparent;border:none;color:var(--gold);font-size:clamp(0.65rem,2.8vw,0.8rem);cursor:pointer;font-family:inherit;padding:4px 0;letter-spacing:0.1em;opacity:0.6;transition:opacity 0.3s;margin-top:4px;display:block}
.reading-content .section .reveal-btn:hover{opacity:1}
.reading-content .section .hidden-content{max-height:0;overflow:hidden;transition:max-height 0.5s ease,opacity 0.4s ease;opacity:0}
.reading-content .section .hidden-content.open{max-height:500px;opacity:1}
.reading-content .section .hidden-content p{margin-top:8px;padding-top:8px;border-top:1px solid rgba(212,175,55,0.1)}
.reading-content .daily-oracle{margin-top:12px;padding:12px 16px;background:rgba(212,175,55,0.04);border:1px solid rgba(212,175,55,0.1);border-radius:4px;text-align:center}
.reading-content .daily-oracle .oracle-label{font-size:clamp(0.55rem,2.5vw,0.65rem);color:var(--gold);letter-spacing:0.2em;opacity:0.5;margin-bottom:4px}
.reading-content .daily-oracle .oracle-text{font-size:clamp(0.7rem,3vw,0.85rem);line-height:1.7;color:var(--light-gold);font-style:italic}
.theme-toggle{display:flex;gap:4px;margin-bottom:14px;background:rgba(9,7,13,0.6);padding:3px;border-radius:4px;border:1px solid rgba(212,175,55,0.1)}
.theme-toggle button{flex:1;background:transparent;border:none;color:var(--text);font-size:clamp(0.65rem,2.8vw,0.8rem);padding:8px 4px;cursor:pointer;font-family:inherit;border-radius:3px;transition:all 0.3s;opacity:0.4;letter-spacing:0.1em}
.theme-toggle button.active{background:rgba(212,175,55,0.12);color:var(--gold);opacity:1}
#cardModal{position:fixed;top:0;left:0;width:100%;height:100%;z-index:300;display:flex;align-items:center;justify-content:center;background:rgba(9,7,13,0.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);opacity:0;pointer-events:none;transition:opacity 0.4s;padding:20px}
#cardModal.open{opacity:1;pointer-events:auto}
#cardModal .modal-content{width:100%;max-width:400px;max-height:85vh;overflow-y:auto;background:linear-gradient(180deg,#1a1528,#0d0a18);border:2px solid var(--gold);border-radius:6px;padding:24px 20px;position:relative;box-shadow:0 0 60px rgba(212,175,55,0.08);-webkit-overflow-scrolling:touch}
#cardModal .modal-content::-webkit-scrollbar{width:2px}
#cardModal .modal-content::-webkit-scrollbar-thumb{background:rgba(212,175,55,0.3);border-radius:2px}
#cardModal .modal-close{position:absolute;top:12px;right:16px;background:transparent;border:none;color:var(--light-gold);font-size:22px;cursor:pointer;opacity:0.4;transition:opacity 0.3s;font-family:inherit}
#cardModal .modal-close:hover{opacity:1}
#cardModal .modal-card-name{font-size:clamp(1rem,4.5vw,1.3rem);color:var(--gold);letter-spacing:0.15em;margin-bottom:2px}
#cardModal .modal-card-sub{font-size:clamp(0.65rem,2.8vw,0.8rem);color:var(--light-gold);opacity:0.5;margin-bottom:12px}
#cardModal .modal-divider{width:60px;height:1px;background:var(--gold);opacity:0.2;margin-bottom:14px}
#cardModal .modal-theme-tabs{display:flex;gap:2px;margin-bottom:14px;background:rgba(9,7,13,0.4);padding:2px;border-radius:3px}
#cardModal .modal-theme-tabs button{flex:1;background:transparent;border:none;color:var(--text);font-size:clamp(0.6rem,2.5vw,0.75rem);padding:6px 2px;cursor:pointer;font-family:inherit;border-radius:2px;transition:all 0.3s;opacity:0.4;letter-spacing:0.08em}
#cardModal .modal-theme-tabs button.active{background:rgba(212,175,55,0.1);color:var(--gold);opacity:1}
#cardModal .modal-reading{animation:fadeIn 0.4s ease}
@keyframes fadeIn{0%{opacity:0;transform:translateY(6px)}100%{opacity:1;transform:translateY(0)}}
#cardModal .modal-reading p{font-size:clamp(0.7rem,3vw,0.85rem);line-height:1.8;color:var(--text);opacity:0.85;margin-bottom:6px}
#cardModal .modal-reading .keywords{margin-top:10px;padding:8px 12px;background:rgba(212,175,55,0.04);border:1px solid rgba(212,175,55,0.1);border-radius:3px}
#cardModal .modal-reading .keywords span{font-size:clamp(0.6rem,2.5vw,0.7rem);color:var(--light-gold);letter-spacing:0.05em}
#cardModal .modal-reading .advice{margin-top:10px;padding:8px 12px;border-left:2px solid var(--gold);font-style:italic}
#cardModal .modal-reading .advice span{display:block;font-size:clamp(0.65rem,2.8vw,0.8rem);color:var(--light-gold);line-height:1.6}
.copy-toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:rgba(212,175,55,0.15);border:1px solid var(--gold);color:var(--gold);padding:10px 24px;font-size:clamp(0.7rem,3vw,0.85rem);border-radius:4px;z-index:999;opacity:0;transition:opacity 0.4s;pointer-events:none;font-family:inherit;letter-spacing:0.1em}
.copy-toast.show{opacity:1}
@media(min-width:768px){#deckContainer{width:160px;height:230px}}
@media(min-width:1024px){#drawScreen .top-bar{max-width:500px}#cardsDisplay{max-width:500px}}
@media(max-width:360px){#cardsDisplay .result-card{width:70px;height:105px}}
.gold-text{color:var(--gold)}
.fade-section{opacity:0;transform:translateY(10px);animation:fadeUp 0.6s ease forwards}
@keyframes fadeUp{to{opacity:1;transform:translateY(0)}}
.delay-1{animation-delay:0.1s}.delay-2{animation-delay:0.2s}.delay-3{animation-delay:0.3s}.delay-4{animation-delay:0.4s}.delay-5{animation-delay:0.5s}
</style>
</head>
<body>
<canvas id="bgCanvas"></canvas>
<div class="copy-toast" id="copyToast">✦ 已复制到剪贴板</div>
<div id="homeScreen" class="screen">
  <div class="title">塔罗秘境</div>
  <div class="subtitle">
    <span>命运从不说话，</span>
    <span>但它会留下痕迹。</span>
    <div class="divider"></div>
    <span>请静下心来，</span>
    <span>默念你想询问的问题</span>
  </div>
  <button id="startBtn">开始占卜<span class="glow"></span></button>
</div>
<div id="drawScreen" class="screen hidden">
  <div class="top-bar">
    <h2>✦ 抽牌</h2>
    <div class="controls">
      <button class="mode-btn active" data-mode="single">单张</button>
      <button class="mode-btn" data-mode="three">三张</button>
      <button class="sound-btn" id="soundToggle" title="音效开关">♫</button>
    </div>
  </div>
  <div id="deckArea">
    <div id="deckContainer" class="floating">
      <div class="card-back layer-1"><div class="ornament"></div><div class="ornament2"></div><div class="inner"><div class="symbol">✦ ☽ ✦</div></div><div class="star" style="top:15%;left:20%"></div><div class="star" style="top:70%;right:25%"></div></div>
      <div class="card-back layer-2"><div class="ornament"></div><div class="ornament2"></div><div class="inner"><div class="symbol">✦ ☽ ✦</div></div><div class="star" style="top:25%;right:18%"></div><div class="star" style="bottom:30%;left:22%"></div></div>
      <div class="card-back layer-3"><div class="ornament"></div><div class="ornament2"></div><div class="inner"><div class="symbol">✦ ☽ ✦</div></div><div class="star" style="top:40%;left:30%"></div><div class="star" style="top:60%;right:28%"></div></div>
      <div class="card-back layer-4"><div class="ornament"></div><div class="ornament2"></div><div class="inner"><div class="symbol">✦ ☽ ✦</div></div><div class="star" style="top:18%;left:40%"></div><div class="star" style="bottom:25%;right:35%"></div></div>
      <div class="card-back layer-5"><div class="ornament"></div><div class="ornament2"></div><div class="inner"><div class="symbol">✦ ☽ ✦</div></div><div class="star" style="top:30%;left:15%"></div><div class="star" style="bottom:40%;right:20%"></div></div>
    </div>
    <div class="draw-hint" id="drawHint">点击牌堆，抽第一张牌</div>
  </div>
  <div id="cardsDisplay"></div>
</div>
<div id="readingPanel">
  <div class="panel-header">
    <h2>✦ 解读</h2>
    <div class="panel-actions">
      <button id="copyReadingBtn">复制牌面</button>
      <button class="close-btn" id="closeReading">✕</button>
    </div>
  </div>
  <div class="panel-body" id="panelBody">
    <div id="readingContent" class="reading-content"></div>
  </div>
</div>
<div id="cardModal">
  <div class="modal-content">
    <button class="modal-close" id="modalClose">✕</button>
    <div id="modalBody"></div>
  </div>
</div>
<script>
const SUITS={WANDS:"权杖",CUPS:"圣杯",SWORDS:"宝剑",PENTACLES:"星币"};
const SUIT_SYMBOLS={WANDS:"♠",CUPS:"♥",SWORDS:"♣",PENTACLES:"♦"};
const MOON_PHASES=["🌑","🌒","🌓","🌔","🌕","🌖","🌗","🌘"];
const ROMAN=["0","I","II","III","IV","V","VI","VII","VIII","IX","X","XI","XII","XIII","XIV","XV","XVI","XVII","XVIII","XIX","XX","XXI"];
const DAILY_ORACLES=[
  "倾听你内心的声音，答案早已在那里。",
  "今日适合静观其变，不必急于行动。",
  "新月之下，适合开启新的计划。",
  "过去的羁绊正在松动，自由将至。",
  "星辰指引你走向一条意想不到的路。",
  "耐心是最好的护身符。",
  "放下执念，才能看清真正的方向。",

      x.save();x.globalAlpha=0.15;x.fillStyle="#6a2d2d";x.font="bold 60px serif";x.textAlign="center";x.textBaseline="middle";

    x.stroke();
  });

  return c.toDataURL();
}
function drawCardBase(x,w,h,bg1,bg2,pat,col){
  // Background gradient
  const g=x.createLinearGradient(0,0,w,h);g.addColorStop(0,bg1);g.addColorStop(1,bg2);
  x.fillStyle=g;x.fillRect(7,7,w-14,h-14);
  // Subtle pattern
  x.save();x.globalAlpha=0.03;
  if(pat==="circle"){x.strokeStyle=col;x.lineWidth=0.5;for(let r=20;r<150;r+=25){x.beginPath();x.arc(w/2,h/2,r,0,Math.PI*2);x.stroke()}}
  else if(pat==="star"){x.strokeStyle=col;x.lineWidth=0.5;for(let i=0;i<8;i++){x.save();x.translate(w/2,h/2);x.rotate(i*Math.PI/4);x.beginPath();x.moveTo(0,-40);x.lineTo(0,40);x.stroke();x.restore()}}
  else if(pat==="diamond"){x.strokeStyle=col;x.lineWidth=0.5;for(let i=0;i<6;i++){x.save();x.translate(w/2,h/2);x.rotate(i*Math.PI/3);x.beginPath();x.rect(-15,-40,30,80);x.stroke();x.restore()}}
  else if(pat==="spiral"){x.strokeStyle=col;x.lineWidth=0.5;for(let i=0;i<12;i++){x.save();x.translate(w/2,h/2);x.rotate(i*Math.PI/6);x.beginPath();x.arc(0,-25,8,0,Math.PI*2);x.stroke();x.restore()}}
  else if(pat==="cross"){x.strokeStyle=col;x.lineWidth=0.5;x.beginPath();x.moveTo(w/2,20);x.lineTo(w/2,h-20);x.moveTo(20,h/2);x.lineTo(w-20,h/2);x.stroke();x.beginPath();x.moveTo(30,30);x.lineTo(w-30,h-30);x.moveTo(w-30,30);x.lineTo(30,h-30);x.stroke()}
  else if(pat==="wave"){x.strokeStyle=col;x.lineWidth=0.5;for(let i=0;i<5;i++){x.beginPath();for(let x2=0;x2<w;x2+=5){x.lineTo(x2,40+i*45+Math.sin(x2*0.08)*12)};x.stroke()}}
  else if(pat==="line"){x.strokeStyle=col;x.lineWidth=0.5;for(let i=0;i<10;i++){x.beginPath();x.moveTo(20+i*18,15);x.lineTo(20+i*18,h-15);x.stroke()}}
  x.restore();
  // Gold dust
  x.save();for(let i=0;i<20;i++){x.fillStyle=`rgba(212,175,55,${Math.random()*0.06})`;x.beginPath();x.arc(Math.random()*w,Math.random()*h,Math.random()*1.5,0,Math.PI*2);x.fill()}
  x.restore();
  // Inner border
  x.save();x.strokeStyle="rgba(212,175,55,0.08)";x.lineWidth=0.5;x.strokeRect(11,11,w-22,h-22);x.restore();
}

   reversed:"关系中出现裂痕或价值观层面的冲突。一个艰难的选择摆在面前，逃避只会让事情变得更复杂。你需要诚实地面对自己在这段关系中的真实感受。",
   love_u:"强烈的吸引力和化学感应，非常适合表白或确定关系。听从你的心。",
   love_r:"关系中的信任危机或第三方的干扰正在考验你们。需要坦诚地沟通。",
   study_u:"兴趣是最好的驱动力，选择你真正热爱和感兴趣的学习方向。",
   study_r:"面临专业或学科方向的抉择，建议听从内心的声音而不是外界的期望。",
   work_u:"合作关系的建立至关重要，寻找与你的价值观一致的伙伴和团队。",
   work_r:"正面临工作选择与道德准则之间的冲突，需要慎重权衡。"},
  {id:7,name:"战车",en:"The Chariot",keywords:"胜利、意志、决心、征服",
   upright:"凭借强大的意志力和不可动摇的决心，你将克服前进路上的一切障碍和挑战。控制你的情绪马车，让理性和激情朝同一个方向前进。胜利属于那些能够驾驭自身力量的人。相信自己，你已经准备好了。",
   reversed:"缺乏明确的方向或意志力涣散。你的情绪在控制你而不是你控制情绪。需要停下来重新定位自己的目标和方向。盲目前进只会离目标越来越远。",
   love_u:"主动去追求你想要的，用行动证明你的决心和诚意。勇敢但不莽撞。",
   love_r:"感情中充满争吵和权力的竞争，需要学会收敛锋芒，关系不是战场。",
   study_u:"冲刺阶段到了，保持专注和投入，你完全有能力取得优异的成绩。",
   study_r:"压力过大导致学习状态起伏不定，需要调整心态和节奏。",
   work_u:"项目推进顺利，势头正好，适合主动争取晋升或承担更多责任。",
   work_r:"职场竞争异常激烈，注意控制情绪，避免与同事发生不必要的冲突。"},
  {id:8,name:"力量",en:"Strength",keywords:"勇气、内在力量、温柔、耐心",
   upright:"真正的力量不是强硬和压迫，而是温柔而坚定的坚持。用耐心和同理心去面对挑战，你比自己想象的更坚强。这张牌提醒你，驯服内心的野兽需要的不是蛮力，而是理解和爱。内在的力量是无声却不可撼动的。",
   reversed:"你被自我怀疑和内心的软弱所困扰。被恐惧或欲望支配，失去了对自己的信心。需要重新找回你内在的力量和勇气，从小的胜利开始积累信心。",
   love_u:"用温和而坚定的方式经营你的感情关系。耐心和理解比激烈的表达更能打动人心。",
   love_r:"在关系中失去了自我，或对方过于强势让你感到压抑。需要重新确立边界。",
   study_u:"坚持下去，即使进步很慢也没关系。持之以恒的努力终会带来成果。",
   study_r:"被挫败感笼罩，需要找回信心和动力。回想一下你最初的学习动机。",
   work_u:"以柔克刚的智慧，用耐心和同理心去解决工作中的复杂问题。",
   work_r:"工作压力正在消耗你的能量和热情，需要学会自我保护，适当休息。"},
  {id:9,name:"隐者",en:"The Hermit",keywords:"内省、孤独、智慧、指引",
   upright:"你需要一段独处的时光。远离喧嚣和干扰，向内探索你真正的需求和方向。真理往往在寂静中显现。孤独不是寂寞，而是智慧的酝酿和心灵的沉淀。给自己一些独处的时间，答案自会浮现。",
   reversed:"过度孤立或拒绝接受他人的帮助。你可能在逃避人群和社交，或迷失在自己的思绪和幻想中。需要在独处和社交之间找到健康的平衡。",
   love_u:"给自己一些空间去思考感情的本质和方向。独处能让你更清晰地看待关系。",
   love_r:"关系中存在情感疏离或冷暴力的倾向。需要主动打破沉默的隔阂。",
   study_u:"非常适合深度钻研和独立研究的阶段，不受外界干扰地专注于你的课题。",
   study_r:"学习陷入闭门造车的困境，需要走出来与他人交流和碰撞思想。",
   work_u:"适合独立思考和专注创作的工作阶段。减少无效社交，聚焦于真正重要的事。",
   work_r:"职场中的人际关系疏离，需要主动伸出橄榄枝，建立必要的沟通渠道。"},
  {id:10,name:"命运之轮",en:"Wheel of Fortune",keywords:"循环、变化、命运、时机",
   upright:"命运的转轮正在转动，变化不可避免。但变化之中蕴含着新的机遇和可能性。顺应自然的节奏，不要抗拒改变。时机正在成熟，你会看到之前播下的种子开始发芽。好运正在向你的方向流动。",
   reversed:"近期运气不佳，或你正在抗拒不可避免的变化。感到被困在同样的循环中无法挣脱。记住，命运之轮总会继续转动，低谷之后必是上升。保持耐心和信心。",
   love_u:"缘分正在靠近，一次意想不到的相遇可能改变你的感情生活。保持开放的心态。",
   love_r:"感情进入瓶颈期，感觉停滞不前。等待转机的同时，也可以主动做一些改变。",
   study_u:"考试运和学习运势较好，把握时机，趁势而上。",
   study_r:"学习状态起伏不定，这是正常的循环。低谷期适合调整和休息。",
   work_u:"行业变革带来了新的机遇，顺应趋势而动，你会找到新的生长点。",
   work_r:"面临裁员或团队变动的高风险期。保持稳定的同时观望新机会。"},
  {id:11,name:"正义",en:"Justice",keywords:"公平、真相、因果、平衡",
   upright:"真相终会浮出水面，因果法则正在运作。做出公平而公正的决定，为自己的所有行为负责。你种下了什么样的种子，就会收获什么样的果实。这张牌鼓励你以诚实和正直的态度面对一切。",
   reversed:"你可能正遭受不公正的对待，或自己在逃避应承担的责任。法律纠纷或其他正式争议可能对你不利。需要诚实地审视自己的行为和决定，做出改正。",
   love_u:"公平地对待彼此，坦诚沟通你们的感受和需求。找到关系的平衡点。",
   love_r:"感情中的不公正行为或欺骗行为即将被揭露，准备好面对真相。",
   study_u:"你的努力和成绩是成正比的。踏实地学习，公平的回报会随之而来。",
   study_r:"考试结果可能不如预期，但这正是你反思学习过程的时机。认真复盘。",
   work_u:"工作中涉及公平和公正的问题需要你认真处理。做正确的事。",
   work_r:"可能面临仲裁、评核或劳务纠纷，准备好相关的证据和材料。"},
  {id:12,name:"倒吊人",en:"The Hanged Man",keywords:"牺牲、暂停、新视角、顺其自然",
   upright:"有些事情需要你主动放下执念，暂时搁置。换一个全新的角度看待问题，答案就会以意想不到的方式浮现。有时候，不作为恰恰是最好的作为。让事情自然发展，你只需要改变你看待它的方式。",
   reversed:"你在进行无谓的牺牲或拖延时间。你已经卡住了，但拒绝换一个角度看问题。你需要果断地采取行动，而不是继续在原地挣扎。",
   love_u:"给感情一些喘息的空间和时间。不要急于推进，让一切自然发酵。",
   love_r:"你在一段关系中不断单方面牺牲和付出，需要重新评估这段关系是否值得。",
   study_u:"换一种学习方式可能会突破当前的瓶颈。试着从不同的角度理解问题。",
   study_r:"学习进度停滞不前，需要调整策略和心态。不要硬撑，换条路试试。",
   work_u:"当前的项目或工作可能需要暂停一下，重新审视方向。暂停是为了更好地前进。",
   work_r:"你感觉付出与回报完全不成正比，需要重新规划你的职业路径。"},
  {id:13,name:"死神",en:"Death",keywords:"结束、转变、放下、新生",
   upright:"结束是新的开始。放下那些已经死去和不再服务于你的一切，为新生命的到来腾出空间。转变的过程虽然痛苦，却是必要的。不要抗拒自然的周期，秋天过去了，春天才会来。死亡不是终点，而是转化的开始。",
   reversed:"你正在抗拒改变，死死抓住已经结束和过时的事物。变革带来的阵痛会因为你的抗拒而延长和加剧。只有彻底放下，才能真正解脱。",
   love_u:"一段关系的结束，或关系正在经历一次深刻的蜕变和转型。",
   love_r:"你放不下过去的感情，无法真正开始新的关系。需要做一次彻底的告别。",
   study_u:"旧的思维方式和学习模式需要被打破，为新的知识体系让路。",
   study_r:"面临学习阶段的重大转变，可能需要换专业、换学校或换方向。",
   work_u:"工作变动、离职或职业转型的强烈信号。旧的结束意味着新的开始。",
   work_r:"死守一个没有前途和发展的岗位只会不断消耗你自己。"},
  {id:14,name:"节制",en:"Temperance",keywords:"平衡、适度、调和、耐心",
   upright:"找到中间的道路和平衡点。在你的生活中建立和谐与均衡，不要走极端。耐心地调和矛盾对立的两方面，中庸之道是真正的智慧。这张牌提醒你，最深刻的疗愈来自于平衡和适度的生活。",
   reversed:"你的生活失去了平衡，正在走向某个极端。急躁或不节制的行为正在带来问题。需要重新找到你的节奏和重心。",
   love_u:"关系中的调和与包容至关重要。互相理解和妥协能让感情更稳定。",
   love_r:"过度情感依赖或极端的行为正在破坏关系。需要找回自我的独立性。",
   study_u:"劳逸结合是最高效的学习方式。保持学习和休息的节奏感很重要。",
   study_r:"学习的作息和节奏已经紊乱，需要尽快调整，找到稳定的日程。",
   work_u:"工作中的平衡艺术至关重要。协调好各方的关系和需求。",
   work_r:"当前的工作负荷已经完全失衡，需要及时调整或与上司沟通。"},
  {id:15,name:"恶魔",en:"The Devil",keywords:"束缚、执念、欲望、依赖",
   upright:"你被某种执念、欲望或不健康的关系束缚住了。看清你的枷锁是什么——可能是物质、不良习惯、依赖关系或内心的恐惧。意识到自己被束缚，就是走向解脱的第一步。这张牌不是让你恐惧，而是让你清醒。",
   reversed:"你正在挣脱束缚，重获自由。你逐渐意识到自己不需要再被那些旧有的模式和执念控制了。这是觉醒和解放的时刻。",
   love_u:"一段不健康的情感依赖或控制关系。你被困住了，但你自己没有意识到。",
   love_r:"你终于看清了这段关系的毒性，决心离开。这是勇敢的一步。",
   study_u:"你被游戏、社交媒体或娱乐严重分心，自控力正在告急。需要严肃对待。",
   study_r:"你正在克服拖延和诱惑的过程。每一次战胜自己都是一次成长。",
   work_u:"对金钱、权力或成功的过度欲望让你失去了工作的初心和快乐。",
   work_r:"你终于可以摆脱一个不健康的工作环境。这是新的开始。"},
  {id:16,name:"高塔",en:"The Tower",keywords:"崩塌、剧变、启示、重建",
   upright:"旧有的结构和信念正在崩塌。看似毁灭性的变故，实则是打破虚伪假象的必要过程。从废墟之中，你才能看清真正的现实和真相。虽然痛苦，但这场崩塌是必要的——只有旧的倒塌了，新的才能建立。",
   reversed:"一场灾难正在被你避免或推迟。拒绝接受真相和现实只会让崩塌之后的修复更加困难。现在的一些小警讯正在提醒你做出改变，请重视它们。",
   love_u:"感情中的突然变故或隐藏的真相被暴露。一切伪装都在这一刻瓦解。",
   love_r:"你成功避免了一场更大的感情灾难，及时止损是聪明的选择。",
   study_u:"考试失利或学术上的重大挫折。但这可能是换一条路的契机。",
   study_r:"一次小失误在提醒你及时调整方向和方法，请重视这个信号。",
   work_u:"公司突然变动、项目取消或裁员消息让你措手不及。保持冷静。",
   work_r:"你及时发现了潜在的风险和危机，成功避免了更严重的后果。"},
  {id:17,name:"星星",en:"The Star",keywords:"希望、宁静、灵感、疗愈",
   upright:"希望的星光在黑暗的天际被重新点燃。平静与灵感正在降临到你身上。信任宇宙的指引和安排，深刻的疗愈正在发生。这张牌是黑暗之后的第一缕曙光，告诉你一切都会好起来的。保持信念，继续前行。",
   reversed:"你正经历信心的低谷，感到希望破灭或灵感枯竭。但星光从未消失，只是暂时被云层遮挡。需要重新建立与自己内在光芒的连接。",
   love_u:"一段充满希望和治愈力的关系。灵魂层面的相互理解和连接。",
   love_r:"你对感情失去了信心，但希望的火种其实从未熄灭。给自己一点时间。",
   study_u:"灵感和创造力充沛的阶段，非常适合艺术、文学和创意类学习。",
   study_r:"学习的内在动力不足，需要找到能重新点燃你热情的方向。",
   work_u:"理想的工作机会或项目方向正在向你走来。保持开放的接收状态。",
   work_r:"你对自己的职业前景感到迷茫和无助。但迷惘过后，方向会自然清晰。"},
  {id:18,name:"月亮",en:"The Moon",keywords:"幻想、恐惧、潜意识、迷雾",
   upright:"事情并不像表面看起来那样简单。你的恐惧、幻想和潜意识正在影响你的判断。慢下来，用你的直觉去分辨什么是真实的、什么是虚幻的。在迷雾中行走时，不要急于做重大决定。等待更多的信息浮现。",
   reversed:"你正在拨开迷雾，逐渐看清真相和现实。内心的恐惧正在被你有意识地面对和克服。光明正在到来。",
   love_u:"感情中存在着未言明的恐惧和不安。一些隐藏的情绪需要被看见和谈论。",
   love_r:"你终于看清了对方的真实面目。迷雾散去后，你可以做出清醒的决定。",
   study_u:"学术研究中可能会遇到困惑、不确定和方向不明的时期。耐心探索。",
   study_r:"你不再迷茫，学习的方向和目标逐渐变得清晰可见。",
   work_u:"职场中存在很多不确定性和流言蜚语。不要轻易相信未经证实的消息。",
   work_r:"真相正在逐渐浮出水面，之前混乱的局势正在变得明朗。"},
  {id:19,name:"太阳",en:"The Sun",keywords:"喜悦、成功、活力、清晰",
   upright:"阳光普照大地，一切都变得明亮而清晰。成功、喜悦和充沛的活力充满你的生命。这是值得庆祝的时刻，所有的努力正在结出果实。这张牌是最好运和最积极的牌之一，好好享受这份光明和温暖吧。",
   reversed:"暂时的阴霾让你感到快乐被抑制，成功似乎延迟了。但太阳从未消失，它只是暂时被云遮挡。不要让暂时的消极情绪掩盖你内在的光芒和能量。",
   love_u:"一段充满阳光、快乐和活力的关系。这是最积极的感情信号之一。",
   love_r:"感情中存在一些小的摩擦和不愉快，但整体趋势是向好的，不必太担心。",
   study_u:"成绩优异，学习状态处于巅峰。继续保持这个良好的节奏。",
   study_r:"暂时的瓶颈和挑战，但只要调整方法，很快就能恢复到良好的状态。",
   work_u:"事业取得显著进展，你的努力和成果正在被看见和认可。恭喜你。",
   work_r:"目前的进展不如你的预期，但前景依然光明，不要轻易放弃。"},
  {id:20,name:"审判",en:"Judgement",keywords:"觉醒、重生、召唤、评价",
   upright:"觉醒的时刻到了。你被内心深处的召唤所触动，去回应你生命的更高目的。过去的经验和教训已经让你做好了准备，现在是时候迎接新的阶段和使命了。聆听那个召唤你的声音，不要忽视它。",
   reversed:"你正在拒绝内心的召唤，或对自己的能力产生严重的怀疑。你听到了那个声音，但因为恐惧而不敢回应。不要辜负你的潜力和命运的安排。",
   love_u:"关系面临一个重要的决定或评判时刻。你需要做出一个诚实而勇敢的选择。",
   love_r:"你正在逃避做出感情中的关键决定，拖延只会让事情变得更复杂。",
   study_u:"重要的考试、升学或评估结果即将揭晓。准备好接受评价。",
   study_r:"你对自己的学术能力产生了深刻的怀疑，需要重新建立自信。",
   work_u:"你正面临职业道路上一个重要的选择或评估。认真对待每一个反馈。",
   work_r:"你因为恐惧而拒绝了一个本该把握的职业发展机会。再想一想。"},
  {id:21,name:"世界",en:"The World",keywords:"完成、圆满、成就、整合",
   upright:"一个完整的生命周期已经圆满结束。你达到了你设定的目标，完成了你的使命。现在，庆祝你的成就，然后准备开始下一段旅程。世界牌代表着最终的完成、整合和满足。你做到了。",
   reversed:"还有未完成的功课和未解决的细节。成功虽然即将到来但被延迟了。不要在第99步的时候放弃，最后的收尾工作需要你的耐心和细心。",
   love_u:"一段关系已经趋于圆满和稳定。这是成熟和完整的情感状态。",

const stars=[];for(let i=0;i<120;i++){stars.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.5+0.3,speed:Math.random()*0.15+0.03,opacity:Math.random()*0.6+0.1,phase:Math.random()*Math.PI*2})}
const particles=[];for(let i=0;i<25;i++){particles.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*2+1,vx:(Math.random()-0.5)*0.3,vy:(Math.random()-0.5)*0.3-0.1,opacity:Math.random()*0.15+0.02,life:Math.random()*200+100})}
const constPoints=[];for(let i=0;i<8;i++){constPoints.push({x:Math.random()*W,y:Math.random()*H})}
let astrolabeAngle=0;let time=0;
function drawBG(){ctx.clearRect(0,0,W,H);time+=0.003;astrolabeAngle+=0.001;
const grad=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*0.7);grad.addColorStop(0,"#0d0a1a");grad.addColorStop(0.5,"#09070d");grad.addColorStop(1,"#050308");ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);
stars.forEach(s=>{const f=Math.sin(time*2+s.phase)*0.3+0.7;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle="rgba(212,175,55,"+(s.opacity*f)+")";ctx.fill()});
ctx.strokeStyle="rgba(212,175,55,0.04)";ctx.lineWidth=0.5;for(let i=0;i<constPoints.length;i++){for(let j=i+1;j<constPoints.length;j++){const dx=constPoints[i].x-constPoints[j].x;const dy=constPoints[i].y-constPoints[j].y;const dist=Math.sqrt(dx*dx+dy*dy);if(dist<Math.min(W,H)*0.35){ctx.beginPath();ctx.moveTo(constPoints[i].x,constPoints[i].y);ctx.lineTo(constPoints[j].x,constPoints[j].y);ctx.stroke()}}}
const cx=W*0.82,ch=H*0.15;const rAst=Math.min(W,H)*0.08;
ctx.save();ctx.translate(cx,ch);ctx.rotate(astrolabeAngle);ctx.strokeStyle="rgba(212,175,55,0.08)";ctx.lineWidth=0.5;
ctx.beginPath();ctx.arc(0,0,rAst,0,Math.PI*2);ctx.stroke();ctx.beginPath();ctx.arc(0,0,rAst*0.7,0,Math.PI*2);ctx.stroke();ctx.beginPath();ctx.arc(0,0,rAst*0.4,0,Math.PI*2);ctx.stroke();
ctx.beginPath();ctx.moveTo(-rAst,0);ctx.lineTo(rAst,0);ctx.moveTo(0,-rAst);ctx.lineTo(0,rAst);ctx.stroke();
ctx.rotate(Math.PI/4);ctx.beginPath();ctx.moveTo(-rAst,0);ctx.lineTo(rAst,0);ctx.moveTo(0,-rAst);ctx.lineTo(0,rAst);ctx.stroke();ctx.restore();
particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life--;if(p.life<=0||p.x<0||p.x>W||p.y<0||p.y>H){p.x=Math.random()*W;p.y=H+10;p.life=Math.random()*200+100}const f=Math.sin(time*3+p.x)*0.3+0.7;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle="rgba(212,175,55,"+(p.opacity*f)+")";ctx.fill()});
for(let f=0;f<2;f++){const fy=H*(0.6+f*0.15)+Math.sin(time*0.5+f)*40;const fw=W*0.8;const fog=ctx.createRadialGradient(W/2,fy,0,W/2,fy,fw*0.5);fog.addColorStop(0,"rgba(212,175,55,"+(0.012+f*0.008)+")");fog.addColorStop(1,"rgba(212,175,55,0)");ctx.fillStyle=fog;ctx.fillRect(0,0,W,H)}
const glow=ctx.createRadialGradient(W/2,H*0.6,0,W/2,H*0.6,Math.max(W,H)*0.5);glow.addColorStop(0,"rgba(212,175,55,0.015)");glow.addColorStop(1,"rgba(212,175,55,0)");ctx.fillStyle=glow;ctx.fillRect(0,0,W,H);
requestAnimationFrame(drawBG)}
drawBG();
document.addEventListener("keydown",(e)=>{if(e.key==="Escape"){if(cardModal.classList.contains("open"))cardModal.classList.remove("open");else if(readingPanel.classList.contains("open"))readingPanel.classList.remove("open")}});
console.log("塔罗秘境 loaded.");
</script>
</body>
</html>
